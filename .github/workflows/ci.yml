name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test-mcp:
    name: MCP Server — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mcp-server/requirements.txt
      - run: pip install -r requirements.txt ruff pytest pytest-asyncio httpx
      - run: ruff check src/
      - run: pytest tests/ -v --tb=short
        if: hashFiles('mcp-server/tests/**') != ''

  lint-test-agent:
    name: Agent — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agent/requirements.txt
      - run: pip install ruff pytest
      - run: ruff check src/
      - run: pytest tests/ -v --tb=short
        if: hashFiles('agent/tests/**') != ''

  lint-test-backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt ruff pytest pytest-asyncio httpx
      - run: ruff check src/
      - run: pytest tests/ -v --tb=short
        if: hashFiles('backend/tests/**') != ''

  typecheck-frontend:
    name: Frontend — type-check & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
