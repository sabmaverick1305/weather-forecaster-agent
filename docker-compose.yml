version: "3.9"

services:
  mcp-server:
    build:
      context: ./mcp-server
    ports:
      - "8000:8000"
    environment:
      OWM_API_KEY: "${OWM_API_KEY}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent:
    build:
      context: ./agent
    ports:
      - "8080:8080"
    environment:
      MCP_SERVER_URL: "http://mcp-server:8000/mcp"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN}"
      BEDROCK_MODEL_ID: "${BEDROCK_MODEL_ID:-us.amazon.nova-lite-v1:0}"
    depends_on:
      mcp-server:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    ports:
      - "8001:8001"
    environment:
      AGENT_RUNTIME_ARN: "${AGENT_RUNTIME_ARN}"
      LOCAL_AGENT_URL: "http://agent:8080/invocations"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN}"
    depends_on:
      - agent

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
